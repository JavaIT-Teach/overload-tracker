<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progressive Overload</title>

<style>
/* Barlow */
@font-face { font-family: 'Barlow'; font-style: normal; font-weight: 300; font-display: swap; src: url("assets/fonts/barlow-300.woff2") format('woff2'); }
@font-face { font-family: 'Barlow'; font-style: normal; font-weight: 400; font-display: swap; src: url("assets/fonts/barlow-400.woff2") format('woff2'); }
@font-face { font-family: 'Barlow'; font-style: normal; font-weight: 500; font-display: swap; src: url("assets/fonts/barlow-500.woff2") format('woff2'); }
@font-face { font-family: 'Barlow'; font-style: normal; font-weight: 600; font-display: swap; src: url("assets/fonts/barlow-600.woff2") format('woff2'); }
@font-face { font-family: 'Barlow'; font-style: normal; font-weight: 700; font-display: swap; src: url("assets/fonts/barlow-700.woff2") format('woff2'); }
/* Geist Mono */
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url("assets/fonts/geistmono.woff2") format('woff2'); }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url("assets/fonts/geistmono.woff2") format('woff2'); }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 600; font-display: swap; src: url("assets/fonts/geistmono.woff2") format('woff2'); }
</style>

<style>
  :root {
    --paper:      #FAFAFA;
    --paper-2:    #F2F2F0;
    --ink:        #0E0E10;
    --ink-2:      #2A2A2E;
    --muted:      #7A7A80;
    --muted-2:    #B4B4B8;
    --hair:       rgba(14, 14, 16, 0.10);
    --hair-2:     rgba(14, 14, 16, 0.06);
    --accent:     #2563EB;
    --accent-2:   #1D4ED8;
    --accent-tint: rgba(37, 99, 235, 0.08);
    --rule-thick: rgba(14, 14, 16, 0.18);

    --st-dev:        #6B7280;
    --st-dev-bg:     #EEF0F3;
    --st-stable:     #15803D;
    --st-stable-bg:  #E6F6EC;
    --st-plateau:    #B45309;
    --st-plateau-bg: #FDF1DC;

    --font-sans:  'Barlow', -apple-system, system-ui, 'Segoe UI', sans-serif;
    --font-mono:  'Geist Mono', ui-monospace, 'SF Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    font-family: var(--font-sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button {
    font-family: inherit;
    color: inherit;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  input, textarea, select {
    font-family: inherit;
    color: inherit;
    font-size: 16px !important;
  }

  textarea { resize: none; }

  .app-scroll {
    min-height: 100vh;
    background: var(--paper);
    max-width: 480px;
    margin: 0 auto;
  }

  @media (max-width: 480px) {
    .app-scroll { max-width: 100%; }
  }

  .reveal { opacity: 1; }
  .reveal-slow { opacity: 1; }

  .rule { height: 1px; background: var(--hair); width: 100%; }

  .tap {
    min-height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .num { font-family: var(--font-mono); font-feature-settings: 'tnum' 1; }

  body { background: var(--paper); }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (CDN) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>

<!-- App source -->
<script src="src/routine-data.js"></script>
<script src="src/progression.js"></script>
<script src="src/seed.js"></script>
<script src="src/seed-history.js"></script>
<script type="text/babel" data-presets="react" src="src/tracker.jsx"></script>
<script type="text/babel" data-presets="react" src="src/app.jsx"></script>

</body>
</html>

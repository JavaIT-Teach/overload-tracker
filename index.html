<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progressive Overload</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:      #FAFAFA;
    --paper-2:    #F2F2F0;
    --ink:        #0E0E10;
    --ink-2:      #2A2A2E;
    --muted:      #7A7A80;
    --muted-2:    #B4B4B8;
    --hair:       rgba(14, 14, 16, 0.10);
    --hair-2:     rgba(14, 14, 16, 0.06);
    --accent:     #EF3E1F;
    --accent-2:   #D2331A;
    --accent-tint: rgba(239, 62, 31, 0.08);
    --rule-thick: rgba(14, 14, 16, 0.18);

    /* Status colors — slightly more prominent */
    --st-dev:        #6B7280; /* cool grey */
    --st-dev-bg:     #EEF0F3;
    --st-stable:     #15803D; /* strong green */
    --st-stable-bg:  #E6F6EC;
    --st-plateau:    #B45309; /* amber */
    --st-plateau-bg: #FDF1DC;

    --font-sans:  'Barlow', -apple-system, system-ui, 'Segoe UI', sans-serif;
    --font-mono:  'Geist Mono', ui-monospace, 'SF Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    font-family: var(--font-sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button {
    font-family: inherit;
    color: inherit;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  input, textarea {
    font-family: inherit;
    color: inherit;
  }

  textarea { resize: none; }

  /* App container — full bleed. Window owns the scroll so the
     auto-hide header listener can read window.scrollY directly. */
  .app-scroll {
    min-height: 100vh;
    background: var(--paper);
    max-width: 480px;
    margin: 0 auto;
  }

  @media (max-width: 480px) {
    .app-scroll { max-width: 100%; }
  }

  /* fade-in for inline reveals — single short transition that completes
     immediately on mount, so html-to-image captures the final state */
  .reveal { opacity: 1; }
  .reveal-slow { opacity: 1; }

  /* canvas-rule: thin baseline that aligns with metric cap height */
  .rule { height: 1px; background: var(--hair); width: 100%; }

  /* underline-only tap target — keep tap surface ≥44px via padding */
  .tap {
    min-height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .num { font-family: var(--font-mono); font-feature-settings: 'tnum' 1; }

  /* On desktop, paint the surrounding viewport in the same warm tone
     so the column reads as a focused canvas, not "phone inside a frame". */
  body { background: var(--paper); }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="progression.js"></script>
<script src="seed.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tracker.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>

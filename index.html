<script>
// Progressive Overload Tracker — pre-loaded routine data
//
// EXPECTED JSON IMPORT FORMAT:
// {
//   "days": [
//     {
//       "id": 1,
//       "name": "PULL",
//       "subtitle": "Back + Biceps + Forearms",
//       "exercises": [
//         {
//           "name": "Chest-Supported Row Machine",
//           "sets": 3,
//           "repMin": 8, "repMax": 10,
//           "weightMin": 140, "weightMax": 160,
//           "repCap": 12,
//           "weightStep": 5,         // optional, default 5 (use 2.5 for dumbbells)
//           "unit": "lbs",           // optional, default "lbs"
//           "notation": null         // optional: "per side" | "per hand" | "per side reps" | "steps" | etc
//         }
//       ]
//     }
//   ]
// }
//
// On import:
//   • Exercises matched by (day, name) preserve their session history.
//   • New exercises start fresh.
//   • Removed exercises have their history archived but never deleted.

// Step heuristics by name keyword
function stepFor(name) {
  const n = name.toLowerCase();
  if (n.includes('dumbbell') || n.includes('lateral raise') || n.includes('hammer curl') || n.includes('incline curl') || n.includes('reverse curl') || n.includes('farmer')) return 2.5;
  return 5;
}

const ex = (name, sets, repMin, repMax, weightMin, weightMax, repCap, opts = {}) => ({
  id: cryptoId(name),
  name,
  sets,
  repMin, repMax,
  weightMin, weightMax,
  repCap,
  weightStep: opts.weightStep ?? stepFor(name),
  unit: opts.unit ?? 'lbs',
  notation: opts.notation ?? null,
  repUnit: opts.repUnit ?? 'reps',
});

function cryptoId(seed) {
  // deterministic-ish id from seed
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return 'ex_' + (h >>> 0).toString(36);
}

const DEFAULT_ROUTINE = {
  days: [
    {
      id: 1, name: 'PULL', subtitle: 'Back · Biceps · Forearms',
      exercises: [
        ex('Low Rows', 3, 10, 12, 121, 121, 12),
        ex('Lat Pulldown', 3, 8, 10, 110, 121, 12),
        ex('Cable Straight-Arm Pulldown', 3, 12, 15, 33, 44, 15),
        ex('Rear Delt Fly Machine', 3, 15, 15, 70, 80, 15),
        ex('Face Pull', 3, 12, 15, 50, 50, 15),
        ex('Incline Dumbbell Curl', 3, 8, 10, 25, 25, 12),
        ex('Behind-the-Back Finger Curls', 2, 12, 15, 60, 66, 15),
        ex('Hammer Curl', 2, 12, 12, 25, 30, 12),
      ],
    },
    {
      id: 2, name: 'PUSH', subtitle: 'Chest · Shoulders · Triceps',
      exercises: [
        ex('Incline Dumbbell Press', 3, 10, 10, 45, 50, 12),
        ex('Seated Dumbbell Shoulder Press', 3, 10, 10, 40, 45, 12),
        ex('Flat Dumbbell Bench Press', 3, 12, 12, 40, 45, 15),
        ex('Machine Chest Fly (Pec Deck)', 3, 12, 15, 100, 100, 15),
        ex('Lower Chest Cable Fly', 3, 12, 15, 22, 22, 15),
        ex('Incline Cable Fly', 3, 12, 15, 13, 17, 15),
        ex('Lateral Raise', 4, 15, 15, 15, 17.5, 15),
        ex('Overhead Triceps Extension', 3, 12, 12, 55, 60, 12),
        ex('Cable Triceps Pushdown', 3, 10, 12, 71, 71, 12),
      ],
    },
    {
      id: 3, name: 'LEGS', subtitle: 'Lower Body · Core',
      exercises: [
        ex('Leg Press', 4, 10, 10, 170, 170, 12, { notation: 'per side' }),
        ex('Romanian Deadlift', 3, 10, 12, 85, 85, 12),
        ex('Lying Leg Curl', 4, 12, 12, 125, 130, 12),
        ex('Leg Extension', 3, 12, 12, 220, 220, 12),
        ex('Hip Adduction', 2, 12, 15, 120, 120, 15),
        ex('Hip Abduction', 2, 15, 15, 160, 180, 15),
        ex('Standing Calf Raise', 3, 15, 15, 110, 110, 15),
        ex('Dead Bug', 3, 8, 8, 0, 0, 12, { notation: 'per side · bodyweight', unit: '' }),
        ex('Cable Woodchop', 3, 12, 12, 33, 33, 15, { notation: 'per side' }),
        ex("Farmer's Walk", 3, 3, 3, 40, 40, 5, { notation: 'per hand', repUnit: 'laps' }),
      ],
    },
    {
      id: 4, name: 'UPPER', subtitle: 'Chest · Back · Shoulders · Arms',
      exercises: [
        ex('Flat Dumbbell Bench Press', 3, 10, 12, 45, 50, 12),
        ex('Neutral-Grip Row Machine', 3, 10, 12, 99, 99, 12),
        ex('Lateral Raise', 3, 12, 15, 17.5, 17.5, 15),
        ex('Cable Fly', 3, 12, 15, 22, 22, 15),
        ex('Close-Grip Bench Press', 3, 8, 10, 70, 70, 12),
        ex('Cable Biceps Curl', 3, 12, 15, 49, 49, 15),
        ex('Reverse Curl', 3, 10, 12, 20, 20, 12),
      ],
    },
  ],
};

// Re-key day exercises so duplicate names across days don't collide
DEFAULT_ROUTINE.days.forEach(d => {
  d.exercises.forEach(e => { e.id = cryptoId(`d${d.id}_${e.name}`); });
});

window.DEFAULT_ROUTINE = DEFAULT_ROUTINE;
window.cryptoId = cryptoId;
window.stepFor = stepFor;
</script>
<script>
// Progression logic & helpers — pure functions
// ─────────────────────────────────────────────────────────────

// Status from exercise definition.
// - Fixed reps + fixed weight  → 'stable'   (ready to progress)
// - Anything with a range      → 'developing'
// 'plateau' is set elsewhere (when cap is reached and weight can't increase).
function deriveStatus(ex) {
  if (ex.plateau) return 'plateau';
  const repFixed = ex.repMin === ex.repMax;
  const weightFixed = ex.weightMin === ex.weightMax;
  if (repFixed && weightFixed) return 'stable';
  return 'developing';
}

// Did the user hit the ceiling? (max reps AND max weight on every set)
function hitCeiling(ex, sets) {
  if (!sets || sets.length === 0) return false;
  return sets.every(s => s.reps >= ex.repMax && s.weight >= ex.weightMax);
}

// Build the rep button row for a logging set: a couple below to a couple above the range,
// clamped to [1, repCap + 2]. Always includes repMin..repMax.
function repButtonRange(ex) {
  const lo = Math.max(1, ex.repMin - 2);
  const hi = Math.min(ex.repCap + 2, ex.repMax + 2);
  const arr = [];
  for (let r = lo; r <= hi; r++) arr.push(r);
  return arr;
}

// Build weight options: 3 steps below current target → 3 steps above target,
// then dedupe & sort. Always include weightMin, weightMax, current target.
function weightButtonRange(ex) {
  const step = ex.weightStep || 5;
  const center = (ex.weightMin + ex.weightMax) / 2;
  const set = new Set();
  for (let i = -3; i <= 3; i++) {
    const v = roundToStep(center + i * step, step);
    if (v >= 0) set.add(v);
  }
  set.add(ex.weightMin); set.add(ex.weightMax);
  return [...set].sort((a, b) => a - b);
}

function roundToStep(v, step) {
  return Math.round(v / step) * step;
}

// Format a number cleanly: 17.5 → "17.5", 50.0 → "50".
function fmt(n) {
  if (n == null) return '';
  if (Number.isInteger(n)) return String(n);
  return String(Math.round(n * 10) / 10);
}

// Pretty target string ("8–10 × 140–160 lbs", "10 × 45 lbs", etc.)
function targetString(ex) {
  const reps = ex.repMin === ex.repMax ? fmt(ex.repMin) : `${fmt(ex.repMin)}–${fmt(ex.repMax)}`;
  const w = ex.weightMin === ex.weightMax ? fmt(ex.weightMin) : `${fmt(ex.weightMin)}–${fmt(ex.weightMax)}`;
  const wPart = (ex.unit === '' && ex.weightMin === 0) ? 'bodyweight' : `${w}${ex.unit ? ' ' + ex.unit : ''}`;
  return `${ex.sets} × ${reps} ${ex.repUnit || 'reps'} · ${wPart}`;
}

// ISO week key, e.g. "2026-W20"
function isoWeekKey(d = new Date()) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dn = (t.getUTCDay() + 6) % 7; // Mon=0
  t.setUTCDate(t.getUTCDate() - dn + 3);
  const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));
  const wk = 1 + Math.round(((t - firstThu) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);
  return `${t.getUTCFullYear()}-W${String(wk).padStart(2, '0')}`;
}

function shortDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fullDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

// Given an ISO week key ("2026-W21"), return the Date of its Monday (UTC).
function isoWeekStart(weekKey) {
  const [y, w] = weekKey.split('-W').map(Number);
  const jan4 = new Date(Date.UTC(y, 0, 4));
  const jan4Dow = (jan4.getUTCDay() + 6) % 7; // Mon=0
  const week1Mon = new Date(jan4.getTime() - jan4Dow * 86400000);
  return new Date(week1Mon.getTime() + (w - 1) * 7 * 86400000);
}

// Human label: "Week of May 19" — Sunday/Monday agnostic, shows ISO-week Monday.
function weekLabel(weekKey) {
  const d = isoWeekStart(weekKey);
  return `Week of ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' })}`;
}

// Long label: "May 19 – May 25, 2026"
function weekRangeLabel(weekKey) {
  const start = isoWeekStart(weekKey);
  const end = new Date(start.getTime() + 6 * 86400000);
  const sameYear = start.getUTCFullYear() === end.getUTCFullYear();
  const startFmt = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
  const endFmt = end.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC',
  });
  return `${startFmt} – ${endFmt}`;
}

// ═══════════════════════════════════════════════════════════════
//  PROGRESSIVE OVERLOAD ENGINE (v2)
//  Pure, offline, no AI. All logic derives from logged data.
// ═══════════════════════════════════════════════════════════════

// Largest weight across a set list.
function maxWeight(sets) {
  return (sets || []).reduce((m, s) => Math.max(m, s.weight || 0), 0);
}

// Total reps across a set list.
function totalReps(sets) {
  return (sets || []).reduce((n, s) => n + (s.reps || 0), 0);
}

// Identical sessions: same length, same reps & weight on every set.
function identicalSessions(a, b) {
  if (!a || !b || a.length !== b.length || a.length === 0) return false;
  return a.every((s, i) => s.reps === b[i].reps && s.weight === b[i].weight);
}

// Standard increment: dumbbells 2.5, machines/cables 5 (encoded in weightStep).
function incrementFor(ex) {
  return ex.weightStep || (typeof stepFor === 'function' ? stepFor(ex.name) : 5) || 5;
}

// Is this a bodyweight exercise?
function isBodyweight(ex) {
  return ex.unit === '' && ex.weightMin === 0 && ex.weightMax === 0;
}

// Deload target: weight × 0.95, rounded to the increment. Shown as a number,
// never a percentage.
function deloadWeight(ex, weight) {
  return roundToStep((weight || 0) * 0.95, incrementFor(ex));
}

const STATUS_LABELS = {
  criteria_met: 'Criteria met — ready to load up',
  partial: 'Partial — hold weight',
  fatigue: 'Fatigue drop detected',
  plateau: 'Plateau detected',
};

// "Up / Down / Same — detail" comparing a session to the previous one.
function comparePerformance(ex, sets, prev) {
  if (!prev || !prev.length) return { dir: 'Same', detail: 'first logged session' };
  const bw = isBodyweight(ex);
  const wNow = maxWeight(sets), wPrev = maxWeight(prev);
  const unit = ex.unit ? ' ' + ex.unit : '';

  if (!bw && wNow !== wPrev) {
    const up = wNow > wPrev;
    return { dir: up ? 'Up' : 'Down', detail: `${up ? 'heavier' : 'lighter'} — ${fmt(wPrev)}${unit} → ${fmt(wNow)}${unit}` };
  }
  // Same top weight → find the set with the largest rep change.
  let best = null;
  const n = Math.min(sets.length, prev.length);
  for (let i = 0; i < n; i++) {
    const d = sets[i].reps - prev[i].reps;
    if (best === null || Math.abs(d) > Math.abs(best.d)) best = { i, d };
  }
  if (!best || best.d === 0) {
    const rNow = totalReps(sets), rPrev = totalReps(prev);
    if (rNow === rPrev) return { dir: 'Same', detail: 'matched last session' };
    const up = rNow > rPrev;
    return { dir: up ? 'Up' : 'Down', detail: `${Math.abs(rNow - rPrev)} ${up ? 'more' : 'fewer'} total reps` };
  }
  const up = best.d > 0;
  return { dir: up ? 'Up' : 'Down', detail: `${Math.abs(best.d)} ${up ? 'more' : 'fewer'} rep${Math.abs(best.d) === 1 ? '' : 's'} on set ${best.i + 1}` };
}

// Core analysis of a session against the exercise's pre-session state and the
// two prior sessions. Returns every signal the UI needs.
function analyze(ex, sets, prev, prevPrev) {
  const bw = isBodyweight(ex);
  const repCeil = ex.repMax;
  const wMaxLogged = maxWeight(sets);

  const hits = sets.map(s => s.reps >= repCeil);
  const allHit = hits.length > 0 && hits.every(Boolean);
  const someHit = hits.some(Boolean);
  const partial = someHit && !allHit;

  // Overload — any set exceeding the rep ceiling by ≥2 (keep the biggest).
  let overload = null;
  sets.forEach((s, i) => {
    const excess = s.reps - repCeil;
    if (excess >= 2 && (!overload || excess > overload.excess)) {
      overload = { set: i + 1, reps: s.reps, excess };
    }
  });

  // Dynamic weight detection — any set above the current ceiling.
  const aboveRange = !bw && wMaxLogged > ex.weightMax;
  const spread = Math.max(0, ex.weightMax - ex.weightMin);
  const newCeil = wMaxLogged;
  const newFloor = Math.max(0, newCeil - spread);

  // Fatigue drop — set 1 vs final set ≥ 3 reps.
  const set1 = sets[0] ? sets[0].reps : 0;
  const lastReps = sets.length ? sets[sets.length - 1].reps : 0;
  const drop = set1 - lastReps;
  const fatigue = drop >= 3;
  const z = fatigue ? deloadWeight(ex, wMaxLogged || ex.weightMax) : null;

  const atRepCap = ex.repMax >= ex.repCap;

  // Plateau A — at rep ceiling (all sets), at weight ceiling, rep cap reached.
  const plateauA = allHit && (bw || wMaxLogged >= ex.weightMax) && atRepCap;
  // Plateau B — identical reps+weight across 3 consecutive sessions.
  const plateauB = identicalSessions(sets, prev) && identicalSessions(prev, prevPrev);
  const plateau = plateauA || plateauB;

  let status;
  if (plateau) status = 'plateau';
  else if (fatigue) status = 'fatigue';
  else if (allHit) status = 'criteria_met';
  else status = 'partial';

  return {
    bodyweight: bw, repCeil, wMaxLogged,
    allHit, partial, someHit,
    overload, aboveRange, newCeil, newFloor, spread,
    fatigue, drop, z, set1, lastReps,
    atRepCap, plateauA, plateauB, plateau,
    status,
    vs: comparePerformance(ex, sets, prev),
  };
}

// Three-line summary built directly from a session's analysis.
//   Line 1 — performance vs last session (Up / Down / Same + detail)
//   Line 2 — progression status (one of the four canonical labels)
//   Line 3 — one actionable note

// Plateau "Next Step" — the specific action from the staged plateau response.
// Always concrete, always with exact numbers; never a vague "vary the stimulus".
// last / prev / prevPrev are set-lists (most-recent first among the three).
//   Stage 1  reps below cap            → add a rep (N+1)
//   Stage 2  reps at cap               → add weight (current + increment)
//   Stage 2-hold  weight just raised,
//            rep floor not rebuilt yet  → hold weight, build back to the floor
//   Stage 3  three identical sessions
//            already at the top         → slow the eccentric / deload
function plateauNextStep(ex, last, prev, prevPrev) {
  const bw = isBodyweight(ex);
  const unit = ex.unit ? ' ' + ex.unit : '';
  const repUnit = ex.repUnit || 'reps';
  const repCap = ex.repCap;
  const repFloor = ex.repMin;
  const incr = incrementFor(ex);

  const sets = last || [];
  const N = sets.length ? sets[sets.length - 1].reps : 0;        // final-set reps
  const minReps = sets.length ? Math.min(...sets.map(s => s.reps)) : 0;
  const X = maxWeight(sets);                                      // current top weight
  const Xnext = roundToStep(X + incr, incr);

  const wPrev = prev && prev.length ? maxWeight(prev) : X;
  const wPrev2 = prevPrev && prevPrev.length ? maxWeight(prevPrev) : wPrev;
  const weightRaisedRecently = !bw && (X > wPrev || wPrev > wPrev2);

  // Stage 2-hold — weight was just/recently raised and the rep floor isn't back.
  if (!bw && weightRaisedRecently && minReps < repFloor) {
    return `Hold at ${fmt(X)}${unit} — build back to ${fmt(repFloor)} ${repUnit}`;
  }
  // Stage 1 — reps still below the cap: add a rep.
  if (N < repCap) {
    return `Increase to ${N + 1} ${repUnit} next session`;
  }
  // Reps are at the cap.
  if (!bw) {
    // Stage 3 — three identical sessions already at the top of the range: the load
    // can't keep climbing on schedule, so change the stimulus or deload.
    const stuck = identicalSessions(sets, prev) && identicalSessions(prev, prevPrev);
    if (stuck && X >= ex.weightMax) {
      return 'Slow the eccentric to 3 seconds, or consider a deload';
    }
    // Stage 2 — rep cap reached: add weight.
    return `Increase weight to ${fmt(Xnext)}${unit} next session`;
  }
  // Bodyweight at cap — keep adding reps.
  return `Increase to ${N + 1} ${repUnit} next session`;
}

function buildSummary(ex, sets, prev, prevPrev) {
  const a = analyze(ex, sets, prev, prevPrev);
  const unit = ex.unit ? ' ' + ex.unit : '';

  const line2 = STATUS_LABELS[a.status];

  let line3;
  if (a.status === 'plateau') {
    line3 = plateauNextStep(ex, sets, prev, prevPrev);
  } else if (a.status === 'fatigue') {
    line3 = `Set 1 was ${a.set1} reps, final set was ${a.lastReps} reps. Consider dropping to ${fmt(a.z)}${unit} next session.`;
  } else if (a.status === 'criteria_met') {
    line3 = a.bodyweight
      ? `Every set reached ${a.repCeil} — add a rep next session.`
      : `Every set hit ${a.repCeil} — confirm the load increase.`;
  } else if (a.overload) {
    line3 = `Set ${a.overload.set} ran ${a.overload.excess} over target — the load is light.`;
  } else {
    line3 = a.someHit
      ? 'Some sets short of the ceiling — hold weight, build the rest up.'
      : 'Working within range — hold weight, add reps next time.';
  }

  return { dir: a.vs.dir, line1: `${a.vs.dir} — ${a.vs.detail}`, line2, line3, status: a.status };
}

// ═══════════════════════════════════════════════════════════════
//  NEXT-SESSION COACH (v4) — deterministic, exactly three outcomes
//  Computed from a SINGLE logged set vs the exercise's stored rep range
//  and weight range. No vague suggestions, no dependence on other sets.
//
//    1. reps < repMin                          → "Repeat weight next session."
//    2. reps in range AND weight < weightMax   → hold (no numeric suggestion)
//    3. reps at repMax AND weight at weightMax → "Weight range increases."
//                                                (shift weight range +1 step,
//                                                 reps reset to floor behaviorally)
//  No other states exist.
// ═══════════════════════════════════════════════════════════════
const VERDICT = {
  repeat:   { kind: 'repeat',   text: 'Repeat weight next session.' },
  hold:     { kind: 'hold',     text: 'Logged \u2014 keep working within current range.' },
  increase: { kind: 'increase', text: 'Weight range increases.' },
};

// The verdict for one just-logged set. Returns null if the set is incomplete.
function nextSessionVerdict(ex, set) {
  if (!ex || !set || set.reps == null || set.weight == null) return null;
  const reps = set.reps, weight = set.weight;
  // 1 — below the rep floor: hold the load, repeat next session.
  if (reps < ex.repMin) return VERDICT.repeat;
  // 3 — both ceilings reached in this set: the weight range steps up.
  //     Bodyweight is excluded (no weight ceiling to raise) and falls to hold.
  if (!isBodyweight(ex) && reps >= ex.repMax && weight >= ex.weightMax) return VERDICT.increase;
  // 2 — inside the range, below the weight ceiling: nothing changes.
  return VERDICT.hold;
}

// True iff EVERY logged set hit both ceilings (max reps AND max weight) — a
// single set falling short of the rep range max must not trigger a range
// increase, even if other sets in the same session hit it.
function sessionRaisesRange(ex, sets) {
  const list = sets || [];
  if (!list.length) return false;
  return list.every(s => {
    const v = nextSessionVerdict(ex, s);
    return v && v.kind === 'increase';
  });
}

// One governing verdict for the post-session summary. Priority: increase > repeat > hold.
function governingVerdict(ex, sets) {
  let sawRepeat = false;
  for (const s of (sets || [])) {
    const v = nextSessionVerdict(ex, s);
    if (!v) continue;
    if (v.kind === 'increase') return VERDICT.increase;
    if (v.kind === 'repeat') sawRepeat = true;
  }
  return sawRepeat ? VERDICT.repeat : VERDICT.hold;
}

// Verdict snapshot for the most recent session of a stored exercise.
function summarize(ex, history) {
  if (!history || !history.length) return null;
  const last = history[history.length - 1];
  return {
    verdict: governingVerdict(ex, last.sets),
    perSet: (last.sets || []).map(s => nextSessionVerdict(ex, s)),
    status: deriveStatus(ex),
  };
}

// Ordered queue of actionable post-log prompts for a freshly logged session.
// Returns at most one weight/progression prompt plus an optional plateau panel,
// so the user is never asked to raise the load twice for the same session.
//   dynamicWeight → overload → progression  (mutually exclusive)
//   plateau replaces all of the above when a plateau is detected
function buildPrompts(a, ex) {
  const prompts = [];
  if (a.aboveRange) {
    prompts.push({ type: 'dynamicWeight', x: a.newCeil, newFloor: a.newFloor });
  } else if (a.plateau) {
    prompts.push({ type: 'plateau', reason: a.plateauB ? 'identical' : 'ceiling' });
  } else if (a.overload && !a.bodyweight) {
    prompts.push({ type: 'overload', set: a.overload.set, reps: a.overload.reps, excess: a.overload.excess });
  } else if (a.allHit) {
    const canProgress = a.bodyweight ? (ex.repMax < ex.repCap) : true;
    if (canProgress) prompts.push({ type: 'progression' });
  }
  return prompts;
}

Object.assign(window, {
  deriveStatus, hitCeiling, repButtonRange, weightButtonRange,
  roundToStep, fmt, targetString, isoWeekKey, isoWeekStart,
  weekLabel, weekRangeLabel, shortDate, fullDate,
  // engine v2
  maxWeight, totalReps, identicalSessions, incrementFor, isBodyweight,
  deloadWeight, comparePerformance, analyze, summarize, buildSummary,
  plateauNextStep,
  buildPrompts,
  STATUS_LABELS,
  // coach v4 — deterministic next-session verdict
  VERDICT, nextSessionVerdict, sessionRaisesRange, governingVerdict,
});

      { date: D.jun14, sets: [s(15,55), s(15,55), s(15,55)] },
      { date: D.jun19, sets: [s(15,55), s(15,55), s(13,55)] },
      { date: D.jun27, sets: [s(15,55), s(15,55), s(15,55)] },
    ],

      { date: D.jun7,  sets: [s(14,22.5), s(12,22.5), s(12,22.5)] },
      { date: D.jun14, sets: [s(14,22.5), s(12,22.5), s(12,22.5)] },
      { date: D.jun19, sets: [s(12,22.5), s(12,22.5), s(12,22.5)] },
      { date: D.jun27, sets: [s(12,25), s(12,25), s(10,25)] },
    ],
  };

  // ── Merge ───────────────────────────────────────────────────
  // Adds any seeded session whose (exercise, calendar-date) pair is not already
  // present in the store. Never edits or removes existing sessions. Mutates and
  // returns the same store object.
  function dayKey(iso) {
    // Deterministic UTC calendar day — independent of the viewer's timezone.
    return String(iso).slice(0, 10);
  }

  function mergeSeedHistory(store) {
    if (!store || !store.sessions) return store;
    if (typeof seedHistory === 'undefined') return store;

    const idFor = (typeof window !== 'undefined' && window.cryptoId)
      ? window.cryptoId
      : (seed => seed); // defensive fallback

    for (const key in seedHistory) {
      const sep = key.indexOf('::');
      const dayId = key.slice(0, sep);
      const name = key.slice(sep + 2);
      const exId = idFor(`d${dayId}_${name}`);

      // Resolve the live exercise def (for unit / target / status). If the
      // exercise isn't present we still seed raw sessions so nothing is lost.
      let ex = null;
      for (const d of (store.days || [])) {
        const found = (d.exercises || []).find(e => e.id === exId);
        if (found) { ex = found; break; }
      }

      const existing = store.sessions[exId] || [];
      const seenDays = new Set(existing.map(se => dayKey(se.date)));

      const additions = [];
      for (const h of seedHistory[key]) {
        if (seenDays.has(dayKey(h.date))) continue; // user/seed data already here
        const sets = h.sets.map(([reps, weight]) => ({ reps, weight }));
        const status = ex && window.deriveStatus ? window.deriveStatus(ex) : 'developing';
        const entry = {
          date: h.date,
          sets,
          note: h.note || '',
          status,
          unit: ex ? ex.unit : 'lbs',
          target: ex && window.targetString ? window.targetString(ex) : '',
          seeded: true,
        };
        if (h.prog) entry.progression = h.prog;
        additions.push(entry);
      }

      if (additions.length) {
        store.sessions[exId] = [...existing, ...additions]
          .sort((a, b) => new Date(a.date) - new Date(b.date));
      }
    }
    return store;
  }

  window.seedHistory = seedHistory;
  window.mergeSeedHistory = mergeSeedHistory;
})();
</script>
<script type="text/babel" data-presets="react">
// tracker.jsx — exercise card, logging, progression, notes, history
// ─────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

// ── Small visual primitives ────────────────────────────────────
function StatusBadge({ status }) {
  const map = {
    developing: { label: 'Developing', fg: '#FFFFFF', bg: 'var(--st-dev)',     dot: 'rgba(255,255,255,0.85)' },
    stable:     { label: 'Stable',     fg: '#FFFFFF', bg: 'var(--st-stable)',  dot: 'rgba(255,255,255,0.9)' },
    plateau:    { label: 'Plateau',    fg: '#FFFFFF', bg: 'var(--st-plateau)', dot: 'rgba(255,255,255,0.9)' },
  };
  const s = map[status] || map.developing;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
      textTransform: 'uppercase', color: s.fg, fontWeight: 600,
      padding: '5px 10px', borderRadius: 4,
      background: s.bg,
      lineHeight: 1,
    }}>
      <span style={{ width: 5, height: 5, borderRadius: 999, background: s.dot }} />
      {s.label}
    </span>
  );
}

function HairlineHeading({ children, kicker }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, paddingBottom: 6 }}>
      <span style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em',
        textTransform: 'uppercase', color: 'var(--muted)',
      }}>{kicker}</span>
      <span style={{ flex: 1, height: 1, background: 'var(--hair)' }} />
      {children}
    </div>
  );
}

// ── Deterministic next-session verdict (v4) ────────────────────
// Exactly three outcomes, shown inline the moment a set is logged.
const VERDICT_TONE = {
  repeat:   { fg: 'var(--st-plateau)', bg: 'var(--st-plateau-bg)', label: 'Repeat weight' },
  hold:     { fg: 'var(--muted)',      bg: 'var(--paper-2)',       label: 'In range' },
  increase: { fg: 'var(--st-stable)',  bg: 'var(--st-stable-bg)',  label: 'Range ↑' },
};

function VerdictLine({ verdict, style }) {
  if (!verdict) return null;
  const t = VERDICT_TONE[verdict.kind] || VERDICT_TONE.hold;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, ...style }}>
      <span style={{
        fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.10em',
        textTransform: 'uppercase', fontWeight: 700, color: t.fg, background: t.bg,
        padding: '4px 8px', borderRadius: 4, lineHeight: 1, flexShrink: 0,
      }}>{t.label}</span>
      <span style={{ fontSize: 13, color: 'var(--ink-2)', fontWeight: 500, lineHeight: 1.35 }}>{verdict.text}</span>
    </div>
  );
}

// ── Rep / Weight tap targets ───────────────────────────────────
function ChoiceRow({ label, options, value, onPick, formatter, unit, optimum, allowCustom, customOptions, onRemoveOption, onTyping, onCommitCustom }) {
  const [customStr, setCustomStr] = useState('');
  const isCustom = value != null && !options.includes(value);

  // Keep custom field in sync when value is set externally to a non-preset
  useEffect(() => {
    if (isCustom) setCustomStr(String(value));
  }, [value, isCustom]);

  const commitCustom = (raw) => {
    const v = parseFloat(raw);
    if (Number.isFinite(v) && v >= 0) {
      onPick(v);
      // Persist the typed value as a saved preset right away, so it becomes a
      // tappable button for the remaining sets in this same session (not only
      // on the next open). No-op if it already matches a default/preset option.
      if (onCommitCustom && !options.includes(v)) onCommitCustom(v);
    }
  };

  return (
    <div>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
        textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8,
      }}>{label}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' }}>
        {options.map(opt => {
          const sel = value === opt;
          const inRange = optimum && opt >= optimum[0] && opt <= optimum[1];
          const isPreset = customOptions && customOptions.has(opt);
          const btn = (
            <button
              onClick={() => { onPick(opt); setCustomStr(''); }}
              className="tap num"
              style={{
                minWidth: 52, padding: '0 12px', height: 44,
                borderRadius: 6,
                background: sel ? 'var(--accent)' : 'var(--card-bg)',
                color: sel ? '#FFFFFF' : (inRange ? 'var(--ink)' : 'var(--muted)'),
                border: sel ? '1px solid var(--accent)' : `0.5px ${isPreset ? 'dashed' : 'solid'} rgba(0,0,0,0.08)`,
                fontSize: 15, fontWeight: 500,
                transition: 'background 120ms ease, color 120ms ease, border-color 120ms ease',
              }}
            >
              {formatter ? formatter(opt) : opt}{unit && !sel ? <span style={{ marginLeft: 3, fontSize: 11, color: 'inherit', opacity: 0.6 }}>{unit}</span> : ''}
            </button>
          );
          if (isPreset && onRemoveOption) {
            return (
              <span key={opt} style={{ position: 'relative', display: 'inline-flex' }}>
                {btn}
                <button
                  onClick={(e) => { e.stopPropagation(); onRemoveOption(opt); }}
                  aria-label="Remove saved weight"
                  className="tap"
                  style={{
                    position: 'absolute', top: -7, right: -7,
                    width: 20, height: 20, minHeight: 20, borderRadius: 999,
                    background: 'var(--ink)', color: 'var(--paper)',
                    fontSize: 12, lineHeight: 1, padding: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    border: '2px solid var(--paper)',
                  }}
                >×</button>
              </span>
            );
          }
          return <Fragment key={opt}>{btn}</Fragment>;
        })}
        {allowCustom && (
          <div style={{
            display: 'inline-flex', alignItems: 'center',
            height: 44, padding: '0 6px 0 10px',
            border: `1px solid ${isCustom ? 'var(--ink)' : 'var(--hair-2)'}`,
            borderRadius: 6,
            background: isCustom ? 'var(--ink)' : 'transparent',
            transition: 'background 120ms ease, border-color 120ms ease',
          }}>
            <input
              type="number"
              inputMode="decimal"
              step="any"
              placeholder="Custom"
              value={customStr}
              onFocus={() => onTyping && onTyping(true)}
              onChange={e => {
                setCustomStr(e.target.value);
                const v = parseFloat(e.target.value);
                if (Number.isFinite(v) && v >= 0) onPick(v);
              }}
              onBlur={e => { onTyping && onTyping(false); commitCustom(e.target.value); }}
              className="num"
              style={{
                width: 72, height: '100%',
                border: 'none', outline: 'none', background: 'transparent',
                fontSize: 16, fontWeight: 500,
                color: isCustom ? 'var(--paper)' : 'var(--ink)',
                MozAppearance: 'textfield',
              }}
            />
            {unit && (
              <span style={{
                fontSize: 11,
                color: isCustom ? 'rgba(250,250,250,0.7)' : 'var(--muted)',
                marginLeft: 2, marginRight: 4,
              }}>{unit}</span>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Logging panel (one row per set) ───────────────────────────
function LoggingPanel({ ex, onCancel, onDone, customWeights, onRemoveCustomWeight, onAddCustomWeight }) {
  const repOptions = useMemo(() => repButtonRange(ex), [ex]);
  const repWord = ex.repUnit || 'reps';
  const repLabel = repWord.charAt(0).toUpperCase() + repWord.slice(1);

  // Custom weights typed during THIS session. Tracked locally so a value entered
  // on one set shows up as a tappable preset on the remaining sets immediately —
  // without waiting on a parent re-read. Merged with any persisted presets.
  const [sessionCustoms, setSessionCustoms] = useState([]);
  const allCustoms = useMemo(() => {
    const s = new Set();
    (customWeights || []).forEach(w => { if (Number.isFinite(w) && w >= 0) s.add(w); });
    sessionCustoms.forEach(w => { if (Number.isFinite(w) && w >= 0) s.add(w); });
    return [...s];
  }, [customWeights, sessionCustoms]);

  const weightOptions = useMemo(() => {
    const set = new Set(weightButtonRange(ex));
    allCustoms.forEach(w => set.add(w));
    return [...set].sort((a, b) => a - b);
  }, [ex, allCustoms]);
  const customWeightSet = useMemo(() => new Set(allCustoms), [allCustoms]);

  // A typed custom weight is committed: surface it on the remaining sets right
  // away (local state) AND persist it so it survives to the next open.
  const handleCommitCustom = (v) => {
    setSessionCustoms(prev => prev.includes(v) ? prev : [...prev, v]);
    if (onAddCustomWeight) onAddCustomWeight(v);
  };

  const bodyweight = ex.unit === '' && ex.weightMin === 0 && ex.weightMax === 0;
  const initialSet = () => ({ reps: null, weight: bodyweight ? 0 : null });
  const [sets, setSets] = useState(() => Array.from({ length: ex.sets }, initialSet));
  const [activeSet, setActiveSet] = useState(0);
  // True while a text field is focused. Gates BOTH the auto-advance and the
  // Save action so nothing fires mid-typing in the custom-weight field.
  const [typing, setTyping] = useState(false);

  const updateSet = (i, patch) => {
    setSets(prev => prev.map((s, idx) => idx === i ? { ...s, ...patch } : s));
  };

  const allLogged = sets.every(s => s.reps != null && s.weight != null);

  // Auto-advance to next set after both reps + weight chosen
  useEffect(() => {
    if (typing) return; // never advance while the user is typing a weight
    const s = sets[activeSet];
    if (s && s.reps != null && s.weight != null && activeSet < sets.length - 1) {
      const t = setTimeout(() => setActiveSet(activeSet + 1), 220);
      return () => clearTimeout(t);
    }
  }, [sets, activeSet, typing]);

  return (
    <div className="reveal" style={{ paddingTop: 18 }}>
      <HairlineHeading kicker="Log session" />
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 22,
        marginTop: 16, padding: '16px 18px',
        background: 'rgba(46, 113, 114, 0.06)', borderRadius: 12,
      }}>
        {sets.map((s, i) => {
          const isActive = i === activeSet;
          const done = s.reps != null && s.weight != null;
          return (
            <div key={i} className={isActive ? 'reveal' : ''}
              style={{
                opacity: isActive || done ? 1 : 0.42,
                transition: 'opacity 200ms ease',
              }}>
              <button
                onClick={() => setActiveSet(i)}
                style={{
                  display: 'flex', alignItems: 'baseline', gap: 10, width: '100%',
                  textAlign: 'left', padding: '0 0 10px',
                }}>
                <span style={{
                  fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
                  textTransform: 'uppercase', color: 'var(--muted)',
                }}>Set {i + 1}</span>
                {done && (
                  <span className="num" style={{ fontSize: 13, color: 'var(--ink-2)' }}>
                    {s.reps} {repWord} · {fmt(s.weight)}{ex.unit ? ' ' + ex.unit : ''}
                  </span>
                )}
                <span style={{ flex: 1, height: 1, background: 'var(--hair-2)', alignSelf: 'center' }} />
              </button>
              {isActive && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14, paddingTop: 4 }}>
                  <ChoiceRow
                    label={repLabel}
                    options={repOptions}
                    value={s.reps}
                    onPick={(v) => updateSet(i, { reps: v })}
                    optimum={[ex.repMin, ex.repMax]}
                  />
                  {!bodyweight && (
                    <ChoiceRow
                      label={`Weight ${ex.unit ? `(${ex.unit})` : ''}`.trim()}
                      options={weightOptions}
                      value={s.weight}
                      onPick={(v) => updateSet(i, { weight: v })}
                      formatter={fmt}
                      optimum={[ex.weightMin, ex.weightMax]}
                      allowCustom
                      unit={ex.unit}
                      customOptions={customWeightSet}
                      onRemoveOption={onRemoveCustomWeight}
                      onCommitCustom={handleCommitCustom}
                      onTyping={setTyping}
                    />
                  )}
                </div>
              )}
              {done && (
                <VerdictLine verdict={nextSessionVerdict(ex, s)} style={{ marginTop: 10 }} />
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', gap: 10, paddingTop: 24 }}>
        <button onClick={onCancel} className="tap" style={{
          flex: 1, height: 48, borderRadius: 6,
          border: '1px solid var(--hair)', color: 'var(--ink-2)',
          fontSize: 14, fontWeight: 500,
        }}>
          Cancel
        </button>
        <button
          onClick={() => { if (typing) return; if (allLogged) onDone(sets); }}
          disabled={!allLogged}
          className="tap" style={{
          flex: 2, height: 48, borderRadius: 6,
          background: allLogged ? 'var(--accent)' : 'var(--paper-2)',
          color: allLogged ? '#FFFFFF' : 'var(--muted-2)',
          fontSize: 14, fontWeight: 600, letterSpacing: '0.02em',
          cursor: allLogged ? 'pointer' : 'not-allowed',
          transition: 'background 200ms ease, color 200ms ease',
        }}>
          {allLogged ? 'Save Session' : `${sets.filter(s => s.reps != null && s.weight != null).length} / ${sets.length} sets logged`}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  POST-LOG PROGRESSION FLOW (v3)
//  After a session is saved, a small queue of prompts appears below the
//  card — one at a time — driven by buildPrompts(). Each is an explicit
//  confirm. When the queue empties, the collapsed summary card remains.
// ══════════════════════════════════════════════════════════════

// What the weight range becomes after one standard increment.
function incrementPreview(ex) {
  const step = incrementFor(ex);
  const newMin = roundToStep(ex.weightMin + step, step);
  const newMax = roundToStep(ex.weightMax + step, step);
  const unit = ex.unit ? ' ' + ex.unit : '';
  const range = newMin === newMax ? fmt(newMax) : `${fmt(newMin)}–${fmt(newMax)}`;
  return { step, newMin, newMax, label: `${range}${unit}` };
}

// Shared shell for every prompt panel.
function PromptShell({ kicker, accent = 'var(--accent)', tint = 'var(--accent-tint)', children }) {
  return (
    <div className="reveal" style={{

      borderLeft: `3px solid ${accent}`,

        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em',
        textTransform: 'uppercase', color: accent, marginBottom: 9, fontWeight: 600,
      }}>{kicker}</div>
      {children}
    </div>
  );
}

function PromptActions({ confirmLabel, onConfirm, onDismiss, dismissLabel = 'Not now' }) {
  return (
    <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
      <button onClick={onDismiss} className="tap" style={{
        flex: 1, height: 44, borderRadius: 6,

      <button onClick={onConfirm} className="tap" style={{

function PromptHeadline({ children }) {

      color: 'var(--ink)', fontWeight: 500, letterSpacing: '-0.01em',

}

// 1 — Dynamic weight detection
function DynamicWeightPrompt({ ex, x, newFloor, onConfirm, onDismiss }) {
  const unit = ex.unit ? ' ' + ex.unit : '';
  return (
    <PromptShell kicker="Above your range">
      <PromptHeadline>
        You logged <span className="num" style={{ color: 'var(--accent)' }}>{fmt(x)}{unit}</span> — above your
        current target range. Update your working range to <span className="num">{fmt(x)}{unit}</span>?
      </PromptHeadline>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)',
        marginTop: 8, letterSpacing: '0.04em',
      }}>New range → {fmt(newFloor)}–{fmt(x)}{unit} · same spread</div>
      <PromptActions confirmLabel={`Update to ${fmt(x)}${unit}`} onConfirm={onConfirm} onDismiss={onDismiss} dismissLabel="Keep range" />
    </PromptShell>
  );
}

// 2 — Double progression
function ProgressionPrompt({ ex, onConfirm, onDismiss }) {
  const bw = ex.unit === '' && ex.weightMin === 0 && ex.weightMax === 0;
  const atRepCap = ex.repMax >= ex.repCap;
  const prev = bw ? null : incrementPreview(ex);
  return (
    <PromptShell kicker="Criteria met">
      <PromptHeadline>
        Progression criteria met. <span style={{ color: 'var(--accent)' }}>Increase load?</span>
      </PromptHeadline>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)',
        marginTop: 8, letterSpacing: '0.04em',
      }}>
        {bw
          ? `Add a rep → target ${Math.min(ex.repCap, ex.repMax + 1)} ${ex.repUnit || 'reps'}`
          : `+${fmt(prev.step)}${ex.unit ? ' ' + ex.unit : ''} → ${prev.label}${atRepCap ? ' · reps stay at cap' : ' · reps reset to floor'}`}
      </div>
      <PromptActions confirmLabel={bw ? 'Add a rep' : 'Increase load'} onConfirm={onConfirm} onDismiss={onDismiss} dismissLabel="Hold" />
    </PromptShell>
  );
}

// 3 — Overload signal (exceeded rep ceiling by ≥2)
function OverloadPrompt({ ex, set, excess, onConfirm, onDismiss }) {
  const prev = incrementPreview(ex);
  return (
    <PromptShell kicker="Load may be light">
      <PromptHeadline>
        You exceeded your rep target by <span className="num" style={{ color: 'var(--accent)' }}>{excess}</span> rep{excess === 1 ? '' : 's'} on
        set <span className="num">{set}</span>. Load may be too light. <span style={{ color: 'var(--accent)' }}>Increase weight now?</span>
      </PromptHeadline>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)',
        marginTop: 8, letterSpacing: '0.04em',
      }}>+{fmt(prev.step)}{ex.unit ? ' ' + ex.unit : ''} → {prev.label}</div>
      <PromptActions confirmLabel="Increase weight" onConfirm={onConfirm} onDismiss={onDismiss} dismissLabel="Not yet" />
    </PromptShell>
  );
}

// 5 — Plateau suggestions: four tappable choices, each logged as a note.
const PLATEAU_CHOICES = [

function PlateauSuggestions({ reason, onChoose, onDismiss, compact }) {

        }}>Dismiss</button>

// Queue driver — shows prompts one at a time, then closes.
function PostLogFlow({ ex, prompts, onApplyIncrement, onUpdateRange, onPlateauChoice, onClose }) {
  const [idx, setIdx] = useState(0);
  const advance = () => {
    if (idx + 1 >= prompts.length) onClose();
    else setIdx(idx + 1);
  };
  const p = prompts[idx];
  if (!p) return null;

  if (p.type === 'dynamicWeight') {
    return (
      <DynamicWeightPrompt
        ex={ex} x={p.x} newFloor={p.newFloor}
        onConfirm={() => { onUpdateRange(ex.id, p.x); advance(); }}
        onDismiss={advance}
      />
    );
  }
  if (p.type === 'overload') {
    return (
      <OverloadPrompt
        ex={ex} set={p.set} excess={p.excess}
        onConfirm={() => { onApplyIncrement(ex.id, 'overload'); advance(); }}
        onDismiss={advance}
      />
    );
  }
  if (p.type === 'progression') {
    return (
      <ProgressionPrompt
        ex={ex}
        onConfirm={() => { onApplyIncrement(ex.id, 'progression'); advance(); }}
        onDismiss={advance}
      />
    );
  }
  if (p.type === 'plateau') {
    return (
      <PlateauSuggestions
        reason={p.reason}
        onChoose={(text, flag) => { onPlateauChoice(ex.id, text, flag); advance(); }}
        onDismiss={advance}
      />
    );
  }
  return null;
}

function Stepper({ label, value, step, min, max, onChange, unit, disabled, hint }) {
  const dec = () => {
    if (disabled) return;
    const v = Math.max(min ?? -Infinity, value - step);
    onChange(v);
  };
  const inc = () => {
    if (disabled) return;
    const v = Math.min(max ?? Infinity, value + step);
    onChange(v);
  };
  return (
    <div style={{ flex: 1 }}>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
        textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 6,
      }}>{label}</div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 0,
        border: '1px solid var(--hair)', borderRadius: 6,
        background: 'var(--paper)', height: 48,
        opacity: disabled ? 0.4 : 1,
      }}>
        <button onClick={dec} className="tap" style={{ width: 44, height: '100%', fontSize: 20, color: 'var(--ink-2)' }} disabled={disabled}>−</button>
        <div className="num" style={{
          flex: 1, textAlign: 'center', fontSize: 20, color: 'var(--ink)', fontWeight: 600,
          letterSpacing: '-0.01em',
        }}>
          {fmt(value)}{unit ? <span style={{ fontSize: 12, color: 'var(--muted)', marginLeft: 4, fontWeight: 400 }}>{unit}</span> : ''}
        </div>
        <button onClick={inc} className="tap" style={{ width: 44, height: '100%', fontSize: 20, color: 'var(--ink-2)' }} disabled={disabled}>+</button>
      </div>
      {hint && (
        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)',
          marginTop: 6, letterSpacing: '0.04em',
        }}>{hint}</div>
      )}
    </div>
  );
}

// ── Persistent Exercise Note ───────────────────────────────────
// One note per exercise, persisted across sessions.
// Saved explicitly via Save button. Deleted explicitly via Delete.
// Never auto-cleared.
function ExerciseNote({ note, onSave, onDelete }) {
  const hasNote = !!(note && note.text);

  const [draft, setDraft] = useState(hasNote ? note.text : '');

  // If the persistent note changes externally, sync the draft
  useEffect(() => {

  if (!hasNote && !editing) {
    return (
      <button
        onClick={() => setEditing(true)}

          marginTop: 12,
          padding: '0 14px', height: 36, borderRadius: 6,
          fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
          color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 600,
        }}
      >
        + Add note
      </button>
    );
  }

  if (hasNote && !editing) {
    return (
      <div style={{
        marginTop: 14, padding: '16px 18px',
        background: 'var(--card-bg)', border: '0.5px solid var(--card-border)',
        borderRadius: 'var(--card-radius)',

          flex: 1, fontSize: 13.5, color: 'var(--ink-2)',
          lineHeight: 1.55, whiteSpace: 'pre-wrap',

          {note.text}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flexShrink: 0 }}>
          <button
            onClick={() => { setDraft(note.text); setEditing(true); }}
            className="tap"
            style={{
              padding: '4px 8px', minHeight: 28,
              fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.10em',
              color: 'var(--ink-2)', textTransform: 'uppercase', fontWeight: 600,
            }}
          >Edit</button>

            onClick={onDelete}
            className="tap"
            style={{
              padding: '4px 8px', minHeight: 28,
              fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.10em',
              color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 600,
            }}
          >Delete</button>
        </div>
      </div>

  }

  // editing

    <div className="reveal" style={{ marginTop: 14 }}>

          width: '100%', padding: 12,

          style={{
            padding: '0 16px', height: 36, borderRadius: 6,
            background: draft.trim() ? 'var(--accent)' : 'var(--paper-2)',
            color: draft.trim() ? '#FFFFFF' : 'var(--muted-2)',

          onClick={() => {
            setEditing(false);
            setDraft(hasNote ? note.text : '');

          style={{
            padding: '0 12px', height: 36, borderRadius: 6,

              fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.10em',
              color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 600,
            }}
          >
            Delete
          </button>
        )}
      </div>

  );

// Deterministic next-session verdict commit — shared by the card's quick-log
// path (none anymore) and LiveExerciseView. Persists logged weights as
// presets and stamps the verdict snapshot. Pure side-effect orchestration —
// the actual three-state logic lives in nextSessionVerdict() (progression.js).
// Returns true if the session's verdict raises the weight range, so the
// caller can confirm with the user before applying it.
function commitSession(ex, sets, { onLog, onAddCustomWeight }) {
  if (onAddCustomWeight) {
    sets.forEach(s => {
      if (s.weight != null && s.weight > 0) onAddCustomWeight(ex.id, s.weight);
    });
  }
  const snapshot = {
    verdict: governingVerdict(ex, sets),
    perSet: sets.map(s => nextSessionVerdict(ex, s)),
    status: deriveStatus(ex),
  };
  onLog(ex.id, { sets, summary: snapshot }, deriveStatus(ex));
  return sessionRaisesRange(ex, sets);
}

// Confirm-before-apply prompt for the v4 deterministic weight-range increase.

// ── Exercise card ─────────────────────────────────────────────
// Tapping anywhere on the card (other than the History toggle or the note
// editor) opens the exercise in full-screen Live Mode. The card itself no
// longer hosts the logging UI — it's a glanceable summary + entry point.
function ExerciseCard({ ex, history, note, done, onOpenLive, onSaveNote, onDeleteNote }) {
  const [historyOpen, setHistoryOpen] = useState(false);
  const cardRef = useRef(null);

  const status = deriveStatus(ex);

  const summary = useMemo(() => {
    if (!history.length) return null;
    const last = history[history.length - 1];
    if (last.summary && last.summary.verdict) return last.summary;
    return summarize(ex, history);
  }, [ex, history]);

  const exNotation = ex.notation;

  const openLive = () => {
    const rect = cardRef.current ? cardRef.current.getBoundingClientRect() : null;
    onOpenLive(ex.id, rect);
  };

  return (
    <article
      ref={cardRef}
      onClick={openLive}
      style={{
        padding: '16px 18px',
        margin: '0 0 12px',
        background: 'var(--card-bg)',
        border: '0.5px solid var(--card-border)',
        borderRadius: 'var(--card-radius)',
        position: 'relative',

<!DOCTYPE html>

<body>

<div id="uiOverlay">

</div>

<div id="title-screen">

</div>

<script>
// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const gcCanvas = document.getElementById('glucoseCanvas');
const gcCtx = gcCanvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── COLOR PALETTE ───────────────────────────────────────────────────────────
const C = {
  insulin:   '#38bdf8',
  glucose:   '#fb923c',
  amino:     '#4ade80',
  fat:       '#facc15',
  ketone:    '#a78bfa',
  cortisol:  '#f87171',
  glycogen:  '#e879f9',
  blood:     '#b91c1c',
  bloodDark: '#7f1d1d',
  organ:     '#1e3a5f',
  organGlow: '#3b82f6',
  bg:        '#000510',
};

// ─── UTILITY ─────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function rand(mn, mx) { return mn + Math.random() * (mx - mn); }
function randInt(mn, mx) { return Math.floor(rand(mn, mx + 1)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }

function glow(color, blur) {
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
}
function noGlow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

// ─── PARTICLE SYSTEM ─────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, type, opts = {}) {
    this.x = x; this.y = y;
    this.type = type;
    this.vx = opts.vx || rand(-0.5, 0.5);
    this.vy = opts.vy || rand(-0.5, 0.5);
    this.life = 1;
    this.decay = opts.decay || rand(0.003, 0.008);
    this.size = opts.size || rand(3, 7);
    this.pulse = Math.random() * Math.PI * 2;
    this.pathFn = opts.pathFn || null;
    this.pathT = 0;
    this.pathSpeed = opts.pathSpeed || 0.004;
    this.label = opts.label || null;
    this.labelShown = false;
    this.persistent = opts.persistent || false;
    if (this.persistent) this.decay = 0;
  }

  update() {
    this.pulse += 0.08;
    if (this.pathFn) {
      this.pathT += this.pathSpeed;
      if (this.pathT <= 1) {
        const p = this.pathFn(this.pathT);
        this.x = p.x; this.y = p.y;
      } else {
        this.life -= this.decay * 3;
      }
    } else {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
    }
  }

  draw() {
    if (this.life <= 0) return;
    const alpha = clamp(this.life, 0, 1);
    const ps = this.size + Math.sin(this.pulse) * 1.5;
    const color = C[this.type] || '#fff';

    ctx.save();
    ctx.globalAlpha = alpha;
    glow(color, 12);

    if (this.type === 'glucose') {
      this._drawHexagon(ps, color);
    } else if (this.type === 'fat') {
      this._drawChain(ps, color);
    } else if (this.type === 'insulin') {
      this._drawInsulin(ps, color);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, ps, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    if (this.label && !this.labelShown) {
      this.labelShown = true;
    }
    if (this.label && alpha > 0.5) {
      noGlow();
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
      ctx.font = 'bold 10px Arial';
      ctx.fillText(this.label, this.x + ps + 4, this.y - ps - 2);
    }
    noGlow();
    ctx.restore();
  }

  _drawHexagon(r, color) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const hx = this.x + r * Math.cos(angle);
      const hy = this.y + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  _drawChain(r, color) {
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(this.x + (i - 1) * r * 0.9, this.y, r * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.moveTo(this.x - r * 0.9, this.y);
    ctx.lineTo(this.x + r * 0.9, this.y);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  _drawInsulin(r, color) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }

  isDead() { return this.life <= 0; }
}

// ─── SCENE SYSTEM ────────────────────────────────────────────────────────────
const SCENES = [
  { title: 'EATING — THE JOURNEY BEGINS',
    caption: 'A person sits down to a balanced mixed meal containing carbohydrates (rice, bread), proteins (chicken, legumes), and healthy fats (olive oil, nuts). This triggers a cascade of metabolic events throughout the body.' },
  { title: 'ORAL DIGESTION',
    caption: 'Chewing breaks food into smaller pieces. Salivary amylase begins hydrolysing starch into maltose. Mastication increases surface area for enzyme action — digestion begins the moment food enters the mouth.' },
  { title: 'ESOPHAGUS & STOMACH',
    caption: 'Peristaltic contractions propel food down the esophagus. In the stomach, hydrochloric acid (pH 1.5–2) and pepsin denature proteins, while churning creates chyme — a semi-liquid mixture ready for the small intestine.' },
  { title: 'SMALL INTESTINE — ABSORPTION',
    caption: 'Pancreatic enzymes (amylase, lipase, proteases) complete digestion. The brush border of microvilli vastly increases absorptive surface area. Glucose is actively transported into enterocytes via SGLT-1 transporters. Amino acids and fatty acids follow.' },
  { title: 'NUTRIENTS ENTER THE BLOODSTREAM',
    caption: 'Glucose and amino acids move through capillary walls into portal blood, heading to the liver. Fatty acids are packaged into chylomicrons and enter the lymphatic system via lacteals before reaching the bloodstream.' },
  { title: 'BLOOD GLUCOSE RISES',
    caption: 'Within 15–30 minutes of eating, blood glucose begins to rise from a fasting level of ~80 mg/dL toward a postprandial peak of 120–140 mg/dL. This rise is detected by the pancreatic beta cells.' },
  { title: 'PANCREAS DETECTS GLUCOSE SURGE',
    caption: 'Beta cells in the Islets of Langerhans contain GLUT-2 receptors that sense elevated blood glucose. As glucose enters beta cells, it is metabolised, ATP rises, K⁺ channels close, the cell depolarises, and calcium influx triggers insulin secretion.' },
  { title: 'INSULIN RELEASED INTO BLOODSTREAM',
    caption: 'Insulin granules fuse with the beta cell membrane and release insulin molecules into surrounding capillaries. Insulin enters the portal circulation, reaching the liver first, then the systemic circulation — every cell in the body.' },
  { title: 'INSULIN BINDS MUSCLE CELLS',
    caption: 'Insulin binds to tyrosine kinase receptors on skeletal muscle cells. This activates an intracellular signalling cascade (IRS-1 → PI3K → AKT) that causes GLUT-4 transporters to translocate from intracellular vesicles to the cell membrane — opening the door to glucose.' },
  { title: 'GLUCOSE ENTERS MUSCLE CELLS',
    caption: 'GLUT-4 channels allow glucose to flood into muscle cells. Glucose is immediately phosphorylated by hexokinase (trapping it inside the cell), then either oxidised via glycolysis for immediate ATP energy, or polymerised into glycogen for later storage.' },
  { title: 'LIVER — GLUCOSE & GLYCOGEN STORAGE',
    caption: 'The liver receives insulin-rich portal blood first. Hepatocytes suppress gluconeogenesis (glucose production), activate glycogen synthase, and convert excess glucose into glycogen. The liver acts as the body\'s primary glucose buffer, storing ~100g of glycogen.' },
  { title: 'ADIPOSE TISSUE — FAT STORAGE',
    caption: 'Insulin is a powerful anti-lipolytic hormone. In adipocytes, insulin stimulates GLUT-4 uptake, activates lipoprotein lipase (breaking down chylomicrons), and suppresses hormone-sensitive lipase — promoting triglyceride synthesis and fat storage.' },
  { title: 'AMINO ACIDS — MUSCLE REPAIR & GROWTH',
    caption: 'Insulin and amino acids together stimulate mTORC1 signalling in muscle cells, driving protein synthesis. Amino acids are incorporated into new muscle proteins for repair and growth. Insulin also promotes amino acid uptake into cells via specific transporters.' },
  { title: 'BLOOD GLUCOSE NORMALISES',
    caption: 'As cells take up glucose, blood sugar gradually falls back toward baseline (~80–100 mg/dL). Insulin secretion slows as beta cells sense normalising glucose levels. The body returns to metabolic homeostasis — the elegant balance maintained by this hormonal system.' },
  { title: 'SYSTEM SUMMARY — METABOLIC HARMONY',
    caption: 'In a healthy organism, this entire process — from the first bite to restored blood glucose — takes 2–3 hours. Insulin is the master metabolic hormone: orchestrating glucose storage, protein synthesis, and fat deposition across every major organ system.' },
];

let currentScene = 0;
let sceneTime = 0;
let paused = false;
let particles = [];
let animFrame;
let started = false;
let glucoseData = [];
let globalTime = 0;

// ─── BLOOD VESSEL PATHS ──────────────────────────────────────────────────────
function vesselPath(t, cx, cy, rx, ry, startAngle, endAngle) {
  const angle = lerp(startAngle, endAngle, t);
  return {
    x: cx + rx * Math.cos(angle),
    y: cy + ry * Math.sin(angle)
  };
}

function linePath(x1, y1, x2, y2) {
  return (t) => ({ x: lerp(x1, x2, t), y: lerp(y1, y2, t) });
}

function curvePath(x1, y1, cpx, cpy, x2, y2) {
  return (t) => {
    const mt = 1 - t;
    return {
      x: mt*mt*x1 + 2*mt*t*cpx + t*t*x2,
      y: mt*mt*y1 + 2*mt*t*cpy + t*t*y2
    };
  };
}

// ─── ORGAN DRAWING LIBRARY ───────────────────────────────────────────────────
function drawOrgan(name, x, y, w, h, color, glowColor, label, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  glow(glowColor, 20);
  ctx.fillStyle = color;
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 1.5;

  switch(name) {
    case 'stomach': drawStomach(x, y, w, h); break;
    case 'intestine': drawIntestine(x, y, w, h); break;
    case 'liver': drawLiver(x, y, w, h); break;
    case 'pancreas': drawPancreas(x, y, w, h); break;
    case 'muscle': drawMuscle(x, y, w, h); break;
    case 'adipose': drawAdipose(x, y, w, h); break;
    case 'brain': drawBrain(x, y, w, h); break;
    case 'heart': drawHeart(x, y, w, h); break;
    default: drawGenericOrgan(x, y, w, h); break;
  }

  noGlow();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${clamp(w/6, 9, 14)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y + h/2 + 18);
  ctx.restore();
}

function drawStomach(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x - w*0.2, y - h*0.5);
  ctx.bezierCurveTo(x - w*0.5, y - h*0.4, x - w*0.6, y + h*0.1, x - w*0.4, y + h*0.5);
  ctx.bezierCurveTo(x - w*0.1, y + h*0.6, x + w*0.3, y + h*0.5, x + w*0.45, y + h*0.2);
  ctx.bezierCurveTo(x + w*0.5, y - h*0.1, x + w*0.3, y - h*0.5, x - w*0.2, y - h*0.5);
  ctx.fill();
  ctx.stroke();
}

function drawIntestine(x, y, w, h) {
  const loops = 4;
  for (let i = 0; i < loops; i++) {
    const yy = y - h*0.4 + (i/loops)*h*0.8;
    const dir = i % 2 === 0 ? 1 : -1;
    ctx.beginPath();
    ctx.ellipse(x + dir*w*0.1, yy, w*0.4, h*0.08, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }
}

function drawLiver(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x - w*0.5, y - h*0.1);
  ctx.bezierCurveTo(x - w*0.4, y - h*0.5, x + w*0.2, y - h*0.5, x + w*0.5, y - h*0.2);
  ctx.bezierCurveTo(x + w*0.5, y + h*0.3, x + w*0.1, y + h*0.5, x - w*0.2, y + h*0.4);
  ctx.bezierCurveTo(x - w*0.5, y + h*0.3, x - w*0.6, y + h*0.1, x - w*0.5, y - h*0.1);
  ctx.fill(); ctx.stroke();
}

function drawPancreas(x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x - w*0.1, y, w*0.55, h*0.28, -0.3, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + w*0.35, y + h*0.05, w*0.22, h*0.2, 0.5, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
}

function drawMuscle(x, y, w, h) {
  for (let i = 0; i < 3; i++) {
    const my = y - h*0.3 + i*h*0.3;
    ctx.beginPath();
    ctx.ellipse(x, my, w*0.45, h*0.12, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
}

function drawAdipose(x, y, w, h) {
  const dots = 7;
  for (let i = 0; i < dots; i++) {
    const ang = (i/dots)*Math.PI*2;
    const r = w*0.28;
    const dx = Math.cos(ang)*r*0.6;
    const dy = Math.sin(ang)*r*0.5;
    ctx.beginPath();
    ctx.arc(x + dx, y + dy, w*0.17, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(x, y, w*0.17, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
}

function drawBrain(x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x - w*0.1, y - h*0.05, w*0.38, h*0.4, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + w*0.15, y - h*0.05, w*0.3, h*0.38, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y - h*0.4);
  ctx.lineTo(x, y + h*0.35);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.stroke();
}

function drawHeart(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, y + h*0.35);
  ctx.bezierCurveTo(x - w*0.5, y, x - w*0.5, y - h*0.4, x, y - h*0.2);
  ctx.bezierCurveTo(x + w*0.5, y - h*0.4, x + w*0.5, y, x, y + h*0.35);
  ctx.fill(); ctx.stroke();
}

function drawGenericOrgan(x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x, y, w*0.5, h*0.4, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
}

// ─── BLOODSTREAM NETWORK ─────────────────────────────────────────────────────
function drawBloodVessels(alpha = 0.5) {
  const W = canvas.width, H = canvas.height;
  ctx.save();
  ctx.globalAlpha = alpha;

  const vessels = [
    // Aorta (vertical center)
    [W*0.5, H*0.15, W*0.5, H*0.85],
    // Portal vein to liver
    [W*0.5, H*0.55, W*0.3, H*0.42],
    // To muscles
    [W*0.5, H*0.5, W*0.75, H*0.65],
    // To brain
    [W*0.5, H*0.2, W*0.5, H*0.1],
    // To intestine
    [W*0.5, H*0.6, W*0.55, H*0.7],
    // To adipose
    [W*0.5, H*0.7, W*0.78, H*0.78],
    // To pancreas
    [W*0.5, H*0.52, W*0.38, H*0.58],
  ];

  vessels.forEach(([x1,y1,x2,y2]) => {
    const grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, C.blood);
    grad.addColorStop(1, C.bloodDark);
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 4;
    glow(C.blood, 8);
    ctx.stroke();
    noGlow();
  });
  ctx.restore();
}

// ─── DRAW ARROWS ─────────────────────────────────────────────────────────────
function drawArrow(x1, y1, x2, y2, color = '#60a5fa', alpha = 0.8) {
  ctx.save();
  ctx.globalAlpha = alpha;
  glow(color, 6);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrowhead
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = 10;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - len*Math.cos(angle-0.4), y2 - len*Math.sin(angle-0.4));
  ctx.lineTo(x2 - len*Math.cos(angle+0.4), y2 - len*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fill();
  noGlow();
  ctx.restore();
}

// ─── FLOATING LABELS ─────────────────────────────────────────────────────────
function drawLabel(text, x, y, color = '#fff', alpha = 1, size = 11) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${size}px Arial`;
  ctx.textAlign = 'center';
  const w = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(0,5,20,0.75)';
  ctx.beginPath();
  ctx.roundRect(x - w/2 - 6, y - size - 2, w + 12, size + 8, 4);
  ctx.fill();
  ctx.fillStyle = color;
  glow(color, 6);
  ctx.fillText(text, x, y);
  noGlow();
  ctx.restore();
}

// ─── CELL MEMBRANE ZOOM ──────────────────────────────────────────────────────
function drawCellZoom(x, y, r, glucoseCount, insulinBound, label, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Cell body
  glow(C.organGlow, 25);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(10,30,80,0.7)';
  ctx.fill();

  // Membrane
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(100,200,255,0.6)';
  ctx.lineWidth = 8;
  ctx.stroke();
  noGlow();

  drawLabel('Cell Membrane', x, y - r - 12, '#93c5fd', alpha);
  drawLabel('Cell Interior', x, y + r*0.3, '#60a5fa', alpha*0.7, 10);

  // Insulin receptors on membrane
  if (insulinBound) {
    for (let i = 0; i < 4; i++) {
      const ang = (i/4)*Math.PI*2 + Math.PI*0.1;
      const rx = x + (r-4)*Math.cos(ang);
      const ry = y + (r-4)*Math.sin(ang);
      glow(C.insulin, 12);
      ctx.beginPath();
      ctx.arc(rx, ry, 6, 0, Math.PI*2);
      ctx.fillStyle = C.insulin;
      ctx.fill();
      // Receptor stalk
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx + 14*Math.cos(ang), ry + 14*Math.sin(ang));
      ctx.strokeStyle = C.insulin;
      ctx.lineWidth = 2;
      ctx.stroke();
      noGlow();
    }
    drawLabel('Insulin Receptor', x + r*0.7, y - r*0.5, C.insulin, alpha, 9);

    // GLUT-4 transporter
    const gx = x + r*0.9*Math.cos(-Math.PI*0.3);
    const gy = y + r*0.9*Math.sin(-Math.PI*0.3);
    ctx.beginPath();
    ctx.arc(gx, gy, 9, 0, Math.PI*2);
    ctx.fillStyle = '#34d399';
    glow('#34d399', 10);
    ctx.fill();
    noGlow();
    drawLabel('GLUT-4\nTransporter', gx + 18, gy - 18, '#34d399', alpha, 8);
    drawArrow(gx, gy - 20, gx, gy - r*0.3, '#34d399', alpha * 0.7);
  }

  // Glucose entering
  for (let i = 0; i < glucoseCount; i++) {
    const ang = rand(0, Math.PI*2);
    const dist = rand(0, r*0.7);
    const gx = x + dist*Math.cos(ang);
    const gy = y + dist*Math.sin(ang);
    glow(C.glucose, 8);
    ctx.beginPath();
    for (let j = 0; j < 6; j++) {
      const ha = (j/6)*Math.PI*2 - Math.PI/6;
      const hx = gx + 5*Math.cos(ha);
      const hy = gy + 5*Math.sin(ha);
      j === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = C.glucose;
    ctx.fill();
    noGlow();
  }

  drawLabel(label, x, y + r + 18, '#e2e8f0', alpha, 11);
  ctx.restore();
}

// ─── GLUCOSE GRAPH ───────────────────────────────────────────────────────────
function updateGlucoseGraph() {
  gcCtx.fillStyle = 'rgba(0,5,20,0.3)';
  gcCtx.fillRect(0, 0, 180, 70);
  gcCtx.clearRect(0, 0, 180, 70);

  gcCtx.strokeStyle = 'rgba(255,140,0,0.15)';
  gcCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    gcCtx.beginPath();
    gcCtx.moveTo(0, i*17.5);
    gcCtx.lineTo(180, i*17.5);
    gcCtx.stroke();
  }

  if (glucoseData.length < 2) return;
  gcCtx.beginPath();
  gcCtx.moveTo(0, 70 - (glucoseData[0]/200)*70);
  glucoseData.forEach((v, i) => {
    gcCtx.lineTo((i/(glucoseData.length-1))*180, 70 - (v/200)*70);
  });
  gcCtx.strokeStyle = C.glucose;
  gcCtx.lineWidth = 2;
  gcCtx.shadowColor = C.glucose;
  gcCtx.shadowBlur = 6;
  gcCtx.stroke();
  gcCtx.shadowBlur = 0;

  gcCtx.fillStyle = '#94a3b8';
  gcCtx.font = '8px Arial';
  gcCtx.fillText('80 mg/dL', 2, 68);
  gcCtx.fillText('200 mg/dL', 2, 8);
  const cur = glucoseData[glucoseData.length-1];
  gcCtx.fillStyle = C.glucose;
  gcCtx.font = 'bold 9px Arial';
  gcCtx.fillText(`${Math.round(cur)} mg/dL`, 90, 12);
}

// ─── SCENE RENDERERS ─────────────────────────────────────────────────────────
function drawStarField() {
  if (!drawStarField.stars) {
    drawStarField.stars = Array.from({length:150}, () => ({
      x: Math.random(), y: Math.random(), r: rand(0.5,1.5), b: rand(0.2,0.8)
    }));
  }
  const W = canvas.width, H = canvas.height;
  drawStarField.stars.forEach(s => {
    ctx.globalAlpha = s.b * 0.4;
    ctx.fillStyle = '#c7d2fe';
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function sceneEating(t) {
  const W = canvas.width, H = canvas.height;
  drawStarField();

  // Person silhouette (simple)
  const px = W*0.18, py = H*0.5;
  ctx.save();
  ctx.globalAlpha = 0.85 * Math.min(1, t*3);
  // Body
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.ellipse(px, py+H*0.12, W*0.07, H*0.15, 0, 0, Math.PI*2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(px, py-H*0.08, W*0.045, 0, Math.PI*2);
  ctx.fill();
  // Arm + fork gesture
  ctx.beginPath();
  ctx.moveTo(px+W*0.04, py+H*0.02);
  ctx.quadraticCurveTo(px+W*0.1, py-H*0.05, px+W*0.09, py-H*0.1);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();

  drawLabel('Person eating a balanced meal', px, py + H*0.3, '#93c5fd', Math.min(1, t*3));

  // Food plate
  const fpx = W*0.35, fpy = H*0.55;
  ctx.save();
  ctx.globalAlpha = Math.min(1, t*2);
  glow('#a3e635', 10);
  ctx.beginPath();
  ctx.ellipse(fpx, fpy, W*0.1, H*0.06, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,200,200,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,200,200,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  noGlow();

  // Carbs (orange)
  ctx.fillStyle = C.glucose; glow(C.glucose,8);
  ctx.beginPath(); ctx.ellipse(fpx-W*0.03, fpy, W*0.03, H*0.03, 0,0,Math.PI*2); ctx.fill();
  // Protein (green)
  ctx.fillStyle = C.amino; glow(C.amino,8);
  ctx.beginPath(); ctx.ellipse(fpx+W*0.03, fpy-H*0.01, W*0.025, H*0.025, 0,0,Math.PI*2); ctx.fill();
  // Fat (yellow)
  ctx.fillStyle = C.fat; glow(C.fat,8);
  ctx.beginPath(); ctx.ellipse(fpx+W*0.01, fpy+H*0.02, W*0.02, H*0.02, 0,0,Math.PI*2); ctx.fill();
  noGlow();
  ctx.restore();

  drawLabel('Carbohydrates', fpx-W*0.03, fpy+H*0.07, C.glucose, Math.min(1,t*4));
  drawLabel('Proteins', fpx+W*0.04, fpy+H*0.07, C.amino, Math.min(1,t*4));
  drawLabel('Fats', fpx+W*0.01, fpy+H*0.08, C.fat, Math.min(1,t*4));

  // Macronutrient particles drifting right
  if (t > 0.3 && Math.random() < 0.12) {
    const types = ['glucose','amino','fat'];
    const type = types[randInt(0,2)];
    particles.push(new Particle(fpx + rand(-20,20), fpy + rand(-20,20), type, {
      vx: rand(0.5,2), vy: rand(-0.5,0.5), decay: 0.01,
      label: type === 'glucose' ? 'Glucose' : type === 'amino' ? 'Amino Acid' : 'Fatty Acid'
    }));
  }
}

function sceneOralDigestion(t) {
  const W = canvas.width, H = canvas.height;
  drawStarField();

  // Mouth cross-section
  const mx = W*0.5, my = H*0.35;
  ctx.save();
  glow('#f59e0b', 15);
  ctx.fillStyle = 'rgba(120,60,20,0.4)';
  ctx.beginPath();
  ctx.ellipse(mx, my, W*0.2, H*0.12, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 2;
  ctx.stroke();
  noGlow();
  drawLabel('MOUTH', mx, my - H*0.15, '#fbbf24', t > 0.1 ? 1 : 0);

  // Teeth
  for (let i = -3; i <= 3; i++) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(mx + i*W*0.025 - 3, my - H*0.1, 6, 12);
    ctx.fillRect(mx + i*W*0.025 - 3, my + H*0.04, 6, 12);

  // Salivary amylase label
  if (t > 0.4) {
    drawLabel('Salivary Amylase', mx - W*0.22, my, '#a3e635', (t-0.4)*5);
    drawArrow(mx - W*0.12, my, mx - W*0.02, my, '#a3e635', (t-0.4)*5);
  }

  // Starch breaking down to glucose
  if (t > 0.5 && Math.random() < 0.15) {
    particles.push(new Particle(mx + rand(-30,30), my, 'glucose', {
      vx: rand(-1,1), vy: rand(-1,1), decay: 0.008, size: 5
    }));

  // Esophagus below
  const ey = H*0.52;
  ctx.save();
  glow(C.blood, 8);
  ctx.fillStyle = 'rgba(120,30,30,0.4)';
  ctx.beginPath();
  ctx.roundRect(mx - W*0.04, my + H*0.12, W*0.08, ey - my - H*0.12, 6);

  noGlow();

  // Peristalsis arrows

    for (let i = 0; i < 3; i++) {
      const ay = my + H*0.12 + i*H*0.08;
      drawArrow(mx, ay, mx, ay + H*0.05, '#f87171', 0.6 * (t-0.3));

}

function sceneGlucoseRise(t) {
  const W = canvas.width, H = canvas.height;
  drawStarField();

  // Graph display
  const graphX = W*0.5 - W*0.25;
  const graphW = W*0.5;
  const graphY = H*0.25;
  const graphH = H*0.4;

  ctx.save();
  glow('#fb923c', 15);
  ctx.fillStyle = 'rgba(0,10,30,0.7)';
  ctx.beginPath();
  ctx.roundRect(graphX, graphY, graphW, graphH, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(251,146,60,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  noGlow();

  drawLabel('BLOOD GLUCOSE LEVELS (mg/dL)', W*0.5, graphY - 12, '#fb923c', 1, 12);

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(graphX+30, graphY+10);
  ctx.lineTo(graphX+30, graphY+graphH-20);
  ctx.lineTo(graphX+graphW-10, graphY+graphH-20);
  ctx.stroke();

  // Glucose curve
  ctx.beginPath();
  const points = 100;
  let first = true;
  const peakT = 0.4;
  for (let i = 0; i <= points; i++) {
    const px = i/points;
    if (px > t) break;
    let gy;
    if (px < peakT) {
      gy = 80 + 60 * easeOut(px/peakT);
    } else {
      gy = 140 - 55 * easeOut((px-peakT)/(1-peakT));
    }
    glucoseData.push(gy);
    const screenX = graphX + 30 + px*(graphW-40);
    const screenY = graphY + graphH - 20 - (gy/200)*(graphH-30);
    first ? ctx.moveTo(screenX, screenY) : ctx.lineTo(screenX, screenY);
    first = false;
  }
  glow(C.glucose, 8);
  ctx.strokeStyle = C.glucose;
  ctx.lineWidth = 3;
  ctx.stroke();
  noGlow();

  // Reference lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  [80, 140, 200].forEach(v => {
    const ly = graphY + graphH - 20 - (v/200)*(graphH-30);
    ctx.beginPath();
    ctx.moveTo(graphX+30, ly);
    ctx.lineTo(graphX+graphW-10, ly);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '9px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(`${v}`, graphX+28, ly+3);
  });
  ctx.setLineDash([]);

  // Current value indicator
  const curT = Math.min(t, 1);
  let curV;
  if (curT < peakT) { curV = 80 + 60*easeOut(curT/peakT); }
  else { curV = 140 - 55*easeOut((curT-peakT)/(1-peakT)); }

  const curX = graphX+30+curT*(graphW-40);
  const curY = graphY+graphH-20-(curV/200)*(graphH-30);
  glow(C.glucose, 20);
  ctx.beginPath();
  ctx.arc(curX, curY, 6, 0, Math.PI*2);
  ctx.fillStyle = C.glucose;
  ctx.fill();
  noGlow();

// ─── UI ──────────────────────────────────────────────────────────────────────
const captionTitle = document.getElementById('captionTitle');
const captionText = document.getElementById('captionText');
const sceneIndicator = document.getElementById('sceneIndicator');
const glucoseGraph = document.getElementById('glucoseGraph');

function buildSceneDots() {
  sceneIndicator.innerHTML = '';
  SCENES.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'scene-dot' + (i === currentScene ? ' active' : '');
    dot.title = SCENES[i].title;
    dot.addEventListener('click', () => goToScene(i));
    sceneIndicator.appendChild(dot);
  });
}

function updateUI() {
  captionTitle.textContent = SCENES[currentScene].title;
  captionText.textContent = SCENES[currentScene].caption;
  document.querySelectorAll('.scene-dot').forEach((d,i) => {
    d.classList.toggle('active', i === currentScene);
  });
  glucoseGraph.style.display = currentScene >= 5 ? 'block' : 'none';
  glucoseData = glucoseData.slice(-60);
}

function goToScene(idx) {
  currentScene = clamp(idx, 0, SCENES.length-1);
  sceneTime = 0;
  particles = [];
  glucoseData = [];
  updateUI();
}

document.getElementById('prevBtn').addEventListener('click', () => goToScene(currentScene-1));
document.getElementById('nextBtn').addEventListener('click', () => goToScene(currentScene+1));
document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ Play' : '⏸ Pause';
});

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
const SCENE_DURATION = 420; // frames per scene (~7s at 60fps)

function drawBackground() {
  const W = canvas.width, H = canvas.height;
  const grad = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
  grad.addColorStop(0, '#000a1f');
  grad.addColorStop(1, '#000005');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function tick() {
  animFrame = requestAnimationFrame(tick);
  if (!started) return;

  if (!paused) {
    sceneTime++;
    globalTime++;
    if (sceneTime >= SCENE_DURATION && currentScene < SCENES.length - 1) {
      goToScene(currentScene + 1);
    }
  }

  const W = canvas.width, H = canvas.height;
  drawBackground();

  const t = clamp(sceneTime / SCENE_DURATION, 0, 1);

  // Scene transition fade
  const fadeIn = Math.min(1, sceneTime / 40);
  const fadeOut = currentScene < SCENES.length-1 ? Math.min(1, (SCENE_DURATION - sceneTime) / 30) : 1;
  ctx.globalAlpha = fadeIn * fadeOut;

  const renderer = sceneRenderers[currentScene] || sceneRenderers[0];
  renderer(t);

  // Draw particles
  particles = particles.filter(p => !p.isDead());
  particles.forEach(p => { p.update(); p.draw(); });

  // Keep particle count reasonable
  if (particles.length > 300) particles.splice(0, 50);

  ctx.globalAlpha = 1;

  // Scene number overlay (top left)
  ctx.save();
  ctx.fillStyle = 'rgba(100,160,255,0.4)';
  ctx.font = '10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`SCENE ${currentScene+1}/${SCENES.length}`, 16, 16);
  ctx.restore();

  updateGlucoseGraph();
}

// ─── TITLE SCREEN ────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  const ts = document.getElementById('title-screen');
  ts.style.opacity = '0';
  setTimeout(() => ts.style.display = 'none', 1000);
  started = true;
  buildSceneDots();
  updateUI();
});

tick();
</script>
</body>
</html>
